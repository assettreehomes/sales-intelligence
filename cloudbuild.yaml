steps:
  # Build and push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--tag=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sales-intelligence:$COMMIT_SHA'
      - '--tag=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sales-intelligence:latest'
      - '--file=backend/Dockerfile'
      - 'backend'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sales-intelligence'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'sales-intelligence'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sales-intelligence:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sales-intelligence:$COMMIT_SHA'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/sales-intelligence:latest'

options:
  logging: CLOUD_LOGGING_ONLY
